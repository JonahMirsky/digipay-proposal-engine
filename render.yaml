services:
  - type: web
    name: digipay-proposal-engine
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CANVA_CLIENT_ID
        sync: false
      - key: CANVA_CLIENT_SECRET
        sync: false
      - key: APP_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.11
